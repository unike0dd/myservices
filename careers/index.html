<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Careers</title>
    <link rel="stylesheet" href="/myservices/assets/styles.css" />
  </head>
  <body>
    <header>
      <div class="container topbar">
        <a class="brand serif" href="/myservices/">Gabriel Services</a>
        <nav class="main-nav">
          <a href="/myservices/about/">About</a><a href="/myservices/services/">Services</a
          ><a href="/myservices/careers/">Careers</a><a href="/myservices/contact/">Contact</a
          ><a href="/myservices/learning/">Learning</a>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <h1>Careers</h1>
        <p>
          Apply to support operations, communication, and service delivery
          workflows across all service domains.
        </p>
        <form>
          <div class="form-grid">
            <div><label>Full Name</label><input /></div>
            <div><label>Email Address</label><input type="email" /></div>
            <div><label>Country Code</label><input /></div>
            <div><label>Contact Number</label><input /></div>
            <div><label>City</label><input /></div>
            <div><label>State/Province</label><input /></div>
            <div><label>Country Zip Code</label><input /></div>
            <div><label>Availability</label><input /></div>
            <div>
              <label
                >Area of Interest (Logistics / Admin / Customer Relations / IT
                Support)</label
              ><select>
                <option>Logistics</option>
                <option>Admin</option>
                <option>Customer Relations</option>
                <option>IT Support</option>
              </select>
            </div>
            <div><label>Experience Level</label><input /></div>
            <div><label>Languages</label><input /></div>
            <div><label>Skills</label><input /></div>
            <div><label>Projects</label><input /></div>
            <div><label>Education</label><input /></div>
            <div><label>Resume/Profile link</label><input /></div>
          </div>
          <div class="form-actions">
            <button class="btn primary" type="submit">Submit Application</button
            ><button class="btn ghost" type="reset">Clear Form</button>
          </div>
        </form>
      </div>
    </main>
    <script src="/myservices/assets/main.js"></script>
  </body>
</html>
