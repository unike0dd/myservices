<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Careers</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="section">
      <div class="container">
        <h1>Careers</h1>
        <p>
          Join our team across logistics, admin, customer relations, and IT
          support.
        </p>
        <form>
          <div class="form-grid">
            <div><label>Full Name</label><input /></div>
            <div><label>Email Address</label><input type="email" /></div>
            <div><label>Country Code</label><input /></div>
            <div><label>Contact Number</label><input /></div>
            <div><label>City</label><input /></div>
            <div><label>State/Province</label><input /></div>
            <div><label>Country Zip Code</label><input /></div>
            <div><label>Availability</label><input /></div>
            <div>
              <label>Area of Interest</label
              ><select>
                <option>Logistics</option>
                <option>Admin</option>
                <option>Customer Relations</option>
                <option>IT Support</option>
              </select>
            </div>
            <div><label>Experience Level</label><input /></div>
            <div><label>Languages</label><input /></div>
            <div><label>Skills</label><input /></div>
            <div><label>Projects</label><input /></div>
            <div><label>Education</label><input /></div>
            <div><label>Resume/Profile link</label><input /></div>
          </div>
          <div class="form-actions">
            <button class="btn primary" type="submit">Submit Application</button
            ><button class="btn ghost" type="reset">Clear Form</button>
          </div>
        </form>
      </div>
    </main>
    <script src="/assets/main.js"></script>
  </body>
</html>
