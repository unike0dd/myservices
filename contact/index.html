<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="section">
      <div class="container">
        <h1>Contact</h1>
        <p>Contact us for support, onboarding, projects, and partnerships.</p>
        <form>
          <div class="form-grid">
            <div><label>Full Name</label><input /></div>
            <div><label>Email Address</label><input type="email" /></div>
            <div><label>Country Code</label><input /></div>
            <div><label>Contact Number</label><input /></div>
            <div><label>City</label><input /></div>
            <div><label>State/Province</label><input /></div>
            <div><label>Space/Suite/Apt</label><input /></div>
            <div><label>Country Zip Code</label><input /></div>
            <div><label>Best Time to Contact You</label><input /></div>
          </div>
          <label>Message</label><textarea></textarea>
          <h3>Inquiry About Remote Assistant</h3>
          <p>
            Skills / Area of Interest / Experience Level / Education / Languages
          </p>
          <div class="form-actions">
            <button class="btn primary" type="submit">Submit</button
            ><button class="btn ghost" type="reset">Clear</button>
          </div>
        </form>
      </div>
    </main>
    <script src="/assets/main.js"></script>
  </body>
</html>
